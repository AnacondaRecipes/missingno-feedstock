{% set name = "missingno" %}
{% set version = "0.5.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  #url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  #sha256: 4a4baa9ca9f9e4e0d9402455df26b656632e94b99e87fa64c0cdbbbc722837ac
  url: https://github.com/ResidentMario/missingno/archive/refs/tags/0.5.2.tar.gz
  sha256: 48be5708007e304432528cfe458eaf3f15c6cab15cd1d5065721e084d887d964

build:
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation --ignore-installed -vvv .

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - numpy
    - scipy
    - matplotlib-base
    - seaborn
    # Undocumented dependency
    - pandas

  # Tests appear to be broken, and likely never worked in the first place (upstream project lacks CI)
  # Older versions neither dependencies (pandas, numpy, python), nor code (commits where they were 
  # introduced) seem to work. Skipping those tests.
  {% set skip_tests = "" %}
  # Test broken due to using an incorrect frequency 'BQ' (quarterly) on month based index.
  # KeyError: 'Could not divide time index into desired frequency.'
  # Related: https://github.com/ResidentMario/missingno/issues/154
  # Related: https://github.com/ResidentMario/missingno/issues/106
  {% set skip_tests = skip_tests + " --deselect=tests/test_viz.py::TestMatrix::test_freq_matrix" %}
  # Tests broken due to attempted dataframe assignment with wrong shape
  # IndexError: single positional indexer is out-of-bounds
  {% set skip_tests = skip_tests + " --deselect=tests/test_viz.py::TestDendrogram::test_method_dendrogram" %}
  {% set skip_tests = skip_tests + " --deselect=tests/test_viz.py::TestDendrogram::test_orientation_dendrogram" %}
  {% set skip_tests = skip_tests + " --deselect=tests/test_viz.py::TestDendrogram::test_simple_dendrogram" %}

test:
  source_files:
    - tests
  imports:
    - missingno
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -vv {{ skip_tests }} tests

about:
  home: https://github.com/ResidentMario/missingno
  license: MIT
  license_family: MIT
  license_file: '{{ environ["RECIPE_DIR"] }}/LICENSE'
  summary: 'Missing data visualization module for Python.'

extra:
  recipe-maintainers:
    - ericmjl
